<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Pong Game</title>
</head>
<body>
    <div class="container">
        <h1>PONG GAME</h1>
        <div class="scoreboard">
            <div class="score">
                <div class="label">Player</div>
                <div class="score-value" id="playerScore">0</div>
            </div>
            <div class="divider">-</div>
            <div class="score">
                <div class="label">Computer</div>
                <div class="score-value" id="computerScore">0</div>
            </div>
        </div>
        <canvas id="pong" width="800" height="400"></canvas>
        <div class="instructions">
            <p><strong>Controls:</strong> Use <span class="key">↑</span> <span class="key">↓</span> Arrow Keys or Mouse to move left paddle</p>
            <p><span class="key">R</span> to Reset Game</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
